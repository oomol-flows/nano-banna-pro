title: "%test-image-edit-flow%"
description: "%test-flow-for-nano-banana-image-edit-subflow%"

nodes:
  - node_id: edit#1
    subflow: self::nano-banana-pro-image-generate
    inputs_from:
      - handle: prompt
        value: "人物换成企鹅"
      - handle: imageUrls
        value:
          - https://v3b.fal.media/files/b/0a90cc67/cxFmraWrl7Yhf6iW4_SYS_iSgWd4Un.png
      - handle: aspectRatio
        value: "1:1"
      - handle: outputFormat
        value: "png"
      - handle: resolution
        value: "1K"
      - handle: numImages
        value: 2
      - handle: pollingInterval
        value: 2
      - handle: timeout
        value: 300
